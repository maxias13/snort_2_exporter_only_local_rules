<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snort Rule Converter — Interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0e1a;
      --panel:   #0f1629;
      --panel-2: #121c33;
      --border:  #1e3a5f;
      --primary: #00d4ff;
      --success: #00ff88;
      --warn:    #ffaa00;
      --error:   #ff4444;
      --text:    #e0e8f0;
      --muted:   #8ea3ba;
      --user-bg: #0a4a7a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: radial-gradient(circle at top right, #0d1730 0%, var(--bg) 60%);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 15, 28, 0.95);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    header img { height: 40px; width: auto; }

    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.04em;
    }

    .header-text p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Chat area ── */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chatArea::-webkit-scrollbar { width: 6px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.system { align-self: flex-start; }
    .msg.full   { max-width: 100%; align-self: stretch; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user   .avatar { background: var(--user-bg); color: var(--primary); }
    .msg.system .avatar { background: var(--panel-2); color: var(--primary); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.55;
      font-size: 0.9rem;
    }

    .msg.user   .bubble { background: var(--user-bg); border-top-right-radius: 4px; color: #cce8ff; }
    .msg.system .bubble { background: var(--panel);   border-top-left-radius: 4px; border: 1px solid var(--border); }
    .msg.full   .bubble { border-radius: 10px; width: 100%; }

    /* Conversion result inside bubble */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .result-title { font-weight: 700; font-size: 0.95rem; }
    .result-title.ok   { color: var(--success); }
    .result-title.warn { color: var(--warn); }
    .result-title.err  { color: var(--error); }

    .rule-code {
      background: #060c1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: Consolas, Monaco, Menlo, monospace;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      color: #b0d8ff;
      margin-bottom: 10px;
    }

    .changes-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .changes-list li::before { content: "• "; color: var(--primary); }
    .changes-list li.warn::before { color: var(--warn); }

    .warn-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.83rem;
      color: var(--warn);
      border-top: 1px solid rgba(255,170,0,0.2);
      padding-top: 8px;
      margin-top: 6px;
    }

    .warn-list li::before { content: "⚠ "; }

    /* Copy button */
    .copy-btn {
      border: 1px solid var(--border);
      background: rgba(0,212,255,0.07);
      color: var(--primary);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(0,212,255,0.15); }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(9,15,28,0.97);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--primary); }

    #msgInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      line-height: 1.5;
    }

    #msgInput::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: #000;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    .send-btn:disabled { opacity: 0.35; cursor: default; }
    .send-btn:not(:disabled):hover { opacity: 0.85; }

    .input-hint {
      font-size: 0.76rem;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
    }

    .input-hint kbd {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.72rem;
    }

    code { font-family: Consolas, Monaco, monospace; color: var(--primary); font-size: 0.88em; }

    @media (max-width: 600px) {
      .msg { max-width: 97%; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <img id="snortLogo" src="snort-logo.png" alt="Snort" onerror="this.style.display='none'" />
    <div class="header-text">
      <h1>Snort Rule Converter</h1>
      <p>Interactive Snort 2 → Snort 3 conversion assistant</p>
    </div>
  </header>

  <div id="chatArea"></div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1"
        placeholder="Snort 2 룰을 붙여넣으세요… (여러 룰은 줄바꿈으로 구분)"></textarea>
      <button class="send-btn" id="sendBtn" title="Send (Ctrl+Enter)">&#9658;</button>
    </div>
    <div class="input-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> 전송 &nbsp;·&nbsp; <kbd>help</kbd> 입력 시 도움말</div>
  </div>

</div>

<script>
(function () {

  // ─────────────────────────────────────────────
  // Snort 2 → 3 conversion engine (same as main converter)
  // ─────────────────────────────────────────────

  const HTTP_BUFFERS = new Set([
    "http_uri","http_raw_uri","http_header","http_raw_header","http_method",
    "http_stat_code","http_stat_msg","http_client_body","http_cookie","http_raw_cookie"
  ]);

  function parseRule(line) {
    const open = line.indexOf("("), close = line.lastIndexOf(")");
    if (open <= 0 || close <= open) return { ok: false };
    const header = line.slice(0, open).trim();
    const options = line.slice(open + 1, close).trim();
    if (!header || !options) return { ok: false };
    return { ok: true, header, options };
  }

  function splitOptions(str) {
    const parts = []; let cur = "", inQ = false, esc = false;
    for (const ch of str) {
      if (esc) { cur += ch; esc = false; continue; }
      if (ch === "\\") { cur += ch; esc = true; continue; }
      if (ch === '"') { inQ = !inQ; cur += ch; continue; }
      if (ch === ";" && !inQ) { const t = cur.trim(); if (t) parts.push(t); cur = ""; continue; }
      cur += ch;
    }
    const tail = cur.trim(); if (tail) parts.push(tail);
    return parts;
  }

  function optionKeyword(o) { return o.split(":", 1)[0].trim().toLowerCase(); }

  function extractOptionValue(options, key) {
    const t = options.find(o => optionKeyword(o) === key.toLowerCase());
    if (!t || !t.includes(":")) return "";
    return t.slice(t.indexOf(":") + 1).trim().replace(/^"|"$/g, "");
  }

  function reorderStickyForContent(options) {
    const out = []; let i = 0;
    while (i < options.length) {
      const key = optionKeyword(options[i]);
      if (key !== "content" && key !== "pcre") { out.push(options[i++]); continue; }
      const trailing = []; let j = i + 1;
      while (j < options.length) {
        const nk = optionKeyword(options[j]);
        if (nk === "content" || nk === "pcre") break;
        trailing.push(options[j++]);
      }
      const idx = trailing.findIndex(t => HTTP_BUFFERS.has(optionKeyword(t)));
      if (idx >= 0) {
        const moved = trailing.splice(idx, 1)[0];
        const prevKey = out.length > 0 ? optionKeyword(out[out.length - 1]) : null;
        if (prevKey !== optionKeyword(moved)) out.push(moved);
      }
      out.push(options[i]); out.push(...trailing); i = j;
    }
    return out;
  }

  function parseDelimitedRegex(text) {
    if (!text || text[0] !== "/") return null;
    let i = 1, esc = false;
    while (i < text.length) {
      const ch = text[i];
      if (!esc && ch === "/") break;
      esc = !esc && ch === "\\";
      if (ch !== "\\") esc = false;
      i++;
    }
    if (i >= text.length) return null;
    return { body: text.slice(1, i), flags: text.slice(i + 1) };
  }

  function convertPcreOption(opt) {
    const m = opt.match(/^pcre\s*:\s*(!?)"([\s\S]*)"\s*$/i);
    if (!m) return { changed: false, option: opt, sticky: [], warnings: [] };
    const neg = m[1] || "", content = m[2];
    if (!content.startsWith("/")) return { changed: false, option: opt, sticky: [], warnings: [] };
    const parsed = parseDelimitedRegex(content);
    if (!parsed) return { changed: false, option: opt, sticky: [], warnings: [] };

    const flagMap = {
      U:"http_uri", I:"http_raw_uri", H:"http_header", B:null,
      D:"http_client_body", P:"http_client_body", C:"http_cookie",
      M:"http_method", S:"http_stat_code", Y:"http_stat_msg", K:"http_raw_cookie"
    };

    const sticky = []; let keptFlags = "", droppedB = false;
    for (const ch of parsed.flags) {
      if (/[A-Z]/.test(ch) && flagMap[ch] !== undefined) {
        if (flagMap[ch] && !sticky.includes(flagMap[ch])) sticky.push(flagMap[ch]);
        else if (!flagMap[ch]) droppedB = true;
      } else { keptFlags += ch; }
    }

    if (!sticky.length && keptFlags === parsed.flags) return { changed: false, option: opt, sticky: [], warnings: [] };

    const pcreWarnings = [];
    if (droppedB) pcreWarnings.push("pcre: B(rawbytes) 플래그 제거됨 — 정규화된 데이터 매칭 확인 필요");

    return { changed: true, sticky, option: `pcre:${neg}"/${parsed.body}/${keptFlags}"`, warnings: pcreWarnings };
  }

  const TAIL_ORDER = ["gid", "sid", "rev"];

  function convertParsedRule(parsed) {
    let options = splitOptions(parsed.options);
    let changeCount = 0;
    const warnings = [];
    const changes = [];
    const originalHasActivates = options.some(o => ["activates","activated_by"].includes(optionKeyword(o)));

    const transformed = [];

    options.forEach(opt => {
      const lower = optionKeyword(opt);

      if (lower === "uricontent") {
        const val = opt.slice(opt.indexOf(":") + 1).trim();
        transformed.push("http_uri"); transformed.push(`content:${val}`);
        changes.push("uricontent → http_uri + content");
        changeCount++; return;
      }
      if (lower === "sameip") { transformed.push("same_ip"); changes.push("sameip → same_ip"); changeCount++; return; }
      if (lower === "fast_pattern") {
        const hasOnly = /^fast_pattern\s*:\s*only\s*$/i.test(opt);
        transformed.push("fast_pattern");
        if (hasOnly) { changes.push("fast_pattern:only → fast_pattern"); changeCount++; }
        return;
      }
      if (lower === "metadata") {
        const val = opt.slice(opt.indexOf(":") + 1).trim();
        const parts = val.split(",").map(s => s.trim()).filter(Boolean);
        const svcs = [], others = [];
        for (const p of parts) {
          const tokens = p.trim().split(/\s+/);
          if (tokens[0].toLowerCase() === "service" && tokens.length >= 2) svcs.push(tokens.slice(1).join(" "));
          else others.push(p);
        }
        if (svcs.length) { svcs.forEach(s => transformed.push(`service:${s}`)); changes.push(`metadata service → service:${svcs.join(", ")}`); changeCount++; }
        if (others.length) { warnings.push("metadata 유지됨 — Snort 3 호환성 확인 필요"); transformed.push(`metadata:${others.join(", ")}`); }
        return;
      }

      const DEPRECATED = { rawbytes:"rawbytes 제거됨", threshold:"threshold 제거됨 → detection_filter 또는 event_filter 사용",
        resp:"resp 제거됨", react:"react 제거됨", tag:"tag 제거됨",
        activates:"activates 제거됨", activated_by:"activated_by 제거됨",
        logto:"logto 제거됨", session:"session 제거됨" };

      if (DEPRECATED[lower]) { warnings.push(DEPRECATED[lower]); changes.push(DEPRECATED[lower]); changeCount++; return; }
      if (lower === "count" && originalHasActivates) { warnings.push("count(activates 연동) 제거됨"); changeCount++; return; }
      if ((lower === "byte_test" || lower === "byte_jump") && /(^|,)\s*string\s*(,|$)/i.test(opt)) {
        warnings.push(`${lower}: string 파라미터 — Snort 3 동작 확인 필요`); transformed.push(opt); return;
      }

      transformed.push(opt);
    });

    // Pass 2
    const reordered = reorderStickyForContent(transformed);
    if (JSON.stringify(reordered) !== JSON.stringify(transformed)) { changes.push("HTTP sticky buffer 순서 재배치"); changeCount++; }

    // Pass 3
    const final = [];
    reordered.forEach(opt => {
      if (optionKeyword(opt) === "pcre") {
        const r = convertPcreOption(opt);
        if (r.changed) {
          if (r.warnings) r.warnings.forEach(w => warnings.push(w));
          r.sticky.forEach(s => final.push(s));
          final.push(r.option);
          changes.push(`PCRE HTTP 플래그 → sticky buffer (${r.sticky.join(", ")})`);
          changeCount++;
        } else { final.push(opt); }
      } else { final.push(opt); }
    });

    // Reorder gid/sid/rev to end
    const tail = [], body = final.filter(o => { if (TAIL_ORDER.includes(optionKeyword(o))) { tail.push(o); return false; } return true; });
    tail.sort((a, b) => TAIL_ORDER.indexOf(optionKeyword(a)) - TAIL_ORDER.indexOf(optionKeyword(b)));
    const tailKeys = tail.map(optionKeyword);
    if (JSON.stringify(tailKeys) !== JSON.stringify(TAIL_ORDER.filter(k => tailKeys.includes(k)))) {
      changes.push("gid/sid/rev 순서 재배치");
    }
    const ordered = [...body, ...tail];

    return {
      rule: `${parsed.header} (${ordered.join("; ")};)`,
      changes,
      warnings,
      changeCount,
      sid: extractOptionValue(ordered, "sid")
    };
  }

  function isSnortRule(text) {
    return /^\s*(alert|log|pass|drop|reject|sdrop|block|rewrite)\s+/i.test(text.trim());
  }

  // ─────────────────────────────────────────────
  // Chat UI
  // ─────────────────────────────────────────────

  const chatArea = document.getElementById("chatArea");
  const msgInput = document.getElementById("msgInput");
  const sendBtn  = document.getElementById("sendBtn");

  // Auto-resize textarea
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + "px";
  });

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); handleSend(); }
  });

  sendBtn.addEventListener("click", handleSend);

  // ── Render helpers ──

  function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

  function appendMsg(role, html, extraClass = "") {
    const msg = document.createElement("div");
    msg.className = `msg ${role} ${extraClass}`.trim();

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "U" : "S";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = html;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    const msg = document.createElement("div");
    msg.className = "msg system";
    msg.id = "typing";
    msg.innerHTML = `<div class="avatar">S</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(msg);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function copyBtn(text) {
    const id = "cb_" + Math.random().toString(36).slice(2);
    setTimeout(() => {
      const btn = document.getElementById(id);
      if (btn) btn.addEventListener("click", () => {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = "Copied!";
          setTimeout(() => btn.textContent = "Copy", 1500);
        });
      });
    }, 50);
    return `<button class="copy-btn" id="${id}">Copy</button>`;
  }

  // ── Conversion response builder ──

  function buildConversionHtml(results) {
    // results: array of { input, result } or { input, error }
    let html = "";

    results.forEach(({ input, result, error }, idx) => {
      if (error) {
        html += `<div style="margin-bottom:12px;">
          <div class="result-header">
            <span class="result-title err">❌ 파싱 오류 — Rule ${idx + 1}</span>
          </div>
          <div class="rule-code">${escHtml(input)}</div>
          <div style="color:var(--error); font-size:0.85rem;">${escHtml(error)}</div>
        </div>`;
        return;
      }

      const { rule, changes, warnings, changeCount } = result;
      const statusClass = warnings.length ? "warn" : "ok";
      const statusIcon  = warnings.length ? "⚠️" : "✅";
      const label = results.length > 1 ? ` — Rule ${idx + 1}` : "";

      html += `<div style="margin-bottom:${idx < results.length - 1 ? "20px" : "0"};">
        <div class="result-header">
          <span class="result-title ${statusClass}">${statusIcon} 변환 완료${label} &nbsp;<span style="font-weight:400; font-size:0.82rem; color:var(--muted);">(${changeCount}개 변경)</span></span>
          ${copyBtn(rule)}
        </div>
        <div class="rule-code">${escHtml(rule)}</div>`;

      if (changes.length) {
        html += `<ul class="changes-list">`;
        changes.forEach(c => { html += `<li>${escHtml(c)}</li>`; });
        html += `</ul>`;
      } else {
        html += `<p style="font-size:0.83rem; color:var(--muted);">변경 사항 없음 — 이미 Snort 3 호환 룰입니다.</p>`;
      }

      if (warnings.length) {
        html += `<ul class="warn-list">`;
        warnings.forEach(w => { html += `<li>${escHtml(w)}</li>`; });
        html += `</ul>`;
      }

      html += `</div>`;
    });

    return html;
  }

  // ── Command handlers ──

  const COMMANDS = {
    help: () => `
      <b>사용 가능한 명령어</b><br><br>
      <code>help</code> — 이 도움말 표시<br>
      <code>clear</code> — 대화 초기화<br><br>
      <b>룰 변환 방법</b><br>
      Snort 2 룰을 그대로 붙여넣으면 자동으로 Snort 3으로 변환됩니다.<br>
      여러 룰을 한 번에 입력할 수 있습니다.<br><br>
      <b>예시</b><br>
      <code style="font-size:0.78rem;">alert tcp any any -> any 80 (msg:"Test"; content:"GET"; http_uri; sid:1; rev:1;)</code>`,

    clear: () => {
      chatArea.innerHTML = "";
      setTimeout(() => appendWelcome(), 10);
      return null;
    }
  };

  function handleSend() {
    const raw = msgInput.value.trim();
    if (!raw) return;

    msgInput.value = "";
    msgInput.style.height = "auto";
    sendBtn.disabled = true;

    // Show user message
    appendMsg("user", escHtml(raw).replace(/\n/g, "<br>"));

    // Command?
    const cmdKey = raw.toLowerCase().trim();
    if (COMMANDS[cmdKey]) {
      const result = COMMANDS[cmdKey]();
      if (result !== null) appendMsg("system", result);
      sendBtn.disabled = false;
      return;
    }

    // Rule conversion
    showTyping();
    setTimeout(() => {
      removeTyping();

      const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const ruleLines = lines.filter(l => isSnortRule(l));
      const nonRuleLines = lines.filter(l => !isSnortRule(l) && !l.startsWith("#"));

      if (!ruleLines.length) {
        // Not a rule
        appendMsg("system", `
          <span style="color:var(--warn);">⚠ Snort 2 룰을 인식하지 못했습니다.</span><br><br>
          룰은 <code>alert</code>, <code>drop</code>, <code>pass</code> 등의 액션으로 시작해야 합니다.<br>
          <code>help</code>를 입력하면 도움말을 볼 수 있습니다.`);
        sendBtn.disabled = false;
        return;
      }

      const results = ruleLines.map(input => {
        const parsed = parseRule(input);
        if (!parsed.ok) return { input, error: "룰 구조를 파싱할 수 없습니다. 괄호 및 헤더 형식을 확인하세요." };
        try {
          return { input, result: convertParsedRule(parsed) };
        } catch (e) {
          return { input, error: e.message };
        }
      });

      const convHtml = buildConversionHtml(results);
      const msgBubble = appendMsg("system", convHtml, results.length > 1 ? "full" : "");

      // Warn about skipped non-rule lines
      if (nonRuleLines.length) {
        appendMsg("system", `<span style="color:var(--muted); font-size:0.85rem;">ℹ ${nonRuleLines.length}개 줄은 룰이 아니어서 건너뛰었습니다.</span>`);
      }

      sendBtn.disabled = false;
    }, 320);
  }

  msgInput.addEventListener("input", () => {
    sendBtn.disabled = !msgInput.value.trim();
  });

  function appendWelcome() {
    appendMsg("system", `
      <b style="color:var(--primary); font-size:1rem;">안녕하세요! 👋</b><br><br>
      Snort 2 룰을 입력하면 Snort 3 룰로 변환하고 변경 내역을 설명해 드립니다.<br><br>
      <b>지원하는 변환:</b>
      <ul style="margin: 8px 0 0 16px; line-height:1.8; font-size:0.88rem;">
        <li>uricontent → http_uri + content</li>
        <li>fast_pattern:only → fast_pattern</li>
        <li>metadata:service → service: 분리</li>
        <li>PCRE HTTP 플래그 → sticky buffer</li>
        <li>HTTP modifier 순서 재배치</li>
        <li>deprecated 옵션 제거 (threshold, rawbytes, resp 등)</li>
        <li>gid/sid/rev 순서 정렬</li>
      </ul><br>
      <span style="color:var(--muted); font-size:0.83rem;"><code>help</code> 입력 시 도움말을 볼 수 있습니다.</span>`);
  }

  // ── Logo white bg removal ──
  (function () {
    const img = document.getElementById("snortLogo");
    if (!img) return;
    function process() {
      const c = document.createElement("canvas");
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const d = ctx.getImageData(0, 0, c.width, c.height);
      const px = d.data;
      for (let i = 0; i < px.length; i += 4) {
        if (px[i] > 230 && px[i+1] > 230 && px[i+2] > 230) px[i+3] = 0;
      }
      ctx.putImageData(d, 0, 0);
      img.src = c.toDataURL("image/png");
    }
    if (img.complete && img.naturalWidth) process();
    else img.addEventListener("load", process, { once: true });
  })();

  // ── Init ──
  sendBtn.disabled = true;
  appendWelcome();

})();
</script>
</body>
</html>
